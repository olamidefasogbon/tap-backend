version: '3.8'

services:
  # 1. The Financial Ledger Database
  db:
    image: postgres:16-alpine
    container_name: tap_postgres
    restart: always
    environment:
      POSTGRES_USER: tap
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: tap_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tap"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. The Background Worker Broker (For Celery 12-hour timers)
  redis:
    image: redis:7-alpine
    container_name: tap_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

# This ensures your database isn't wiped if you restart your computer
volumes:
  pgdata: